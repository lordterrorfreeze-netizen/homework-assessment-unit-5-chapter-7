<!DOCTYPE html>
<html>
<head>
    <title>PLANET CLICKER: Bug-Free Edition</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; font-family: 'Courier New', Courier, monospace; background: #000; color: #00d4ff; overflow: hidden; user-select: none; }
        
        #space-panel { flex: 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #0a0a2a 0%, #000 100%); border-right: 3px solid #00d4ff; position: relative; }
        #mass-container { text-align: center; width: 90%; z-index: 5; }
        #mass-display { font-size: 32px; font-weight: bold; text-shadow: 0 0 15px #00d4ff; color: #fff; margin-bottom: 5px; word-wrap: break-word; }
        #mps-display { font-size: 18px; color: #ff00ff; margin-bottom: 30px; font-weight: bold; }
        
        #planet { 
            width: 300px; height: 300px; cursor: pointer; transition: 0.05s; 
            border-radius: 50%; background: radial-gradient(circle at 30% 30%, #4facfe 0%, #00f2fe 100%);
            box-shadow: inset -20px -20px 50px rgba(0,0,0,0.8), 0 0 40px rgba(79, 172, 254, 0.4);
            border: none; outline: none;
        }
        #planet:active { transform: scale(0.94); filter: brightness(1.3) hue-rotate(20deg); }

        #store-panel { width: 400px; background: #050508; overflow-y: auto; border-left: 2px solid #111; }
        .section-title { background: #00d4ff; padding: 15px; text-align: center; font-weight: bold; color: #000; text-transform: uppercase; letter-spacing: 2px; }
        
        .upgrade { background: #0a0a0a; margin: 3px; padding: 15px; display: flex; justify-content: space-between; border: 1px solid #1a1a1a; cursor: pointer; transition: 0.2s; }
        .upgrade:hover:not(.locked) { background: #111122; border-color: #00d4ff; }
        .upgrade.locked { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; border-color: #333; }
        .upgrade-info b { display: block; font-size: 18px; color: #00d4ff; }
        .upgrade-info span { color: #888; font-size: 13px; }
        .upgrade-count { font-size: 28px; font-weight: bold; color: #1a1a1a; padding-left: 10px; }

        #admin-status { position: absolute; bottom: 20px; left: 20px; color: #ff00ff; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div id="space-panel">
    <div id="mass-container">
        <div id="mass-display">0 kg of Mass</div>
        <div id="mps-display">MPS: 0</div>
        <div id="planet" onclick="handlePlanetClick()"></div>
    </div>
    <div id="admin-status">Space-Time Status: Stable</div>
</div>

<div id="store-panel">
    <div class="section-title">Galactic Upgrades</div>
    <div id="upgrade-list"></div>
</div>

<script>
// THE 5000T CONSTANT (5 Quadrillion)
const FIVE_THOUSAND_TRILLION = 5000000000000000;

let mass = 0;
let totalMPS = 0;
let clickPower = 1;
let ownerMode = false;

const upgrades = [
    { id: 0, name: "Asteroid Impact", cost: 15, mps: 0.1, owned: 0 },
    { id: 1, name: "Moon Orbit", cost: 100, mps: 1, owned: 0 },
    { id: 2, name: "Gas Giant Wind", cost: 1100, mps: 8, owned: 0 },
    { id: 3, name: "Star Fusion", cost: 12000, mps: 47, owned: 0 },
    { id: 4, name: "Neutron Star", cost: 130000, mps: 260, owned: 0 },
    { id: 5, name: "Black Hole", cost: 1400000, mps: 1400, owned: 0 }
];

function handlePlanetClick() {
    mass += clickPower;
    updateUI();
}

function updateUI() {
    // BUG FIX: Prevent Scientific Notation for huge numbers
    document.getElementById('mass-display').innerText = Math.floor(mass).toLocaleString() + " kg";
    document.getElementById('mps-display').innerText = "MPS: " + totalMPS.toLocaleString();
    renderStore();
}

function renderStore() {
    const list = document.getElementById('upgrade-list');
    list.innerHTML = "";
    upgrades.forEach(u => {
        let price = Math.floor(u.cost * Math.pow(1.15, u.owned));
        let canAfford = mass >= price;
        
        let div = document.createElement('div');
        div.className = canAfford ? "upgrade" : "upgrade locked";
        div.innerHTML = `
            <div class="upgrade-info">
                <b>${u.name}</b>
                <span>Price: ${price.toLocaleString()} kg</span>
            </div>
            <div class="upgrade-count">${u.owned}</div>
        `;
        div.onclick = () => { 
            if(mass >= price) { 
                mass -= price; 
                u.owned++; 
                calculateMPS(); 
                updateUI(); 
            } 
        };
        list.appendChild(div);
    });
}

function calculateMPS() {
    if (ownerMode) {
        totalMPS = FIVE_THOUSAND_TRILLION;
    } else {
        totalMPS = 0;
        upgrades.forEach(u => totalMPS += (u.owned * u.mps));
    }
}

// Tick loop (Run every 100ms for smooth visuals)
setInterval(() => {
    mass += (totalMPS / 10);
    updateUI();
}, 100);

// --- THE OWNER BYPASS (CTRL + /) ---
window.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === '/') {
        e.preventDefault();
        
        ownerMode = true;
        mass = 999000000000000000; // Instant Quadrillions
        clickPower = FIVE_THOUSAND_TRILLION;
        totalMPS = FIVE_THOUSAND_TRILLION;

        // Visual "Supernova" Reset
        const status = document.getElementById('admin-status');
        status.innerText = "SYSTEM HIJACK: 5000T GOD-PARTICLE ACTIVE";
        status.style.color = "#00ff00";
        document.getElementById('space-panel').style.borderRight = "5px solid #ff00ff";
        
        const planet = document.getElementById('planet');
        planet.style.background = "radial-gradient(circle at 30% 30%, #ff00ff 0%, #00ff00 100%)";
        planet.style.boxShadow = "0 0 100px #ff00ff";
        
        // Force immediate recalculation and UI refresh
        calculateMPS();
        updateUI();
    }
});

// Initial Render
updateUI();
</script>
</body>
</html>
